<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>DeepSeek AI 助手 - 多会话</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            background: #1e1e2f;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }
        /* 侧边栏 */
        .sidebar {
            width: 260px;
            background: #2d2d3a;
            color: #fff;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #3e3e4a;
            transition: transform 0.3s ease;
            z-index: 100;
        }
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #3e3e4a;
        }
        .new-chat-btn {
            width: 100%;
            padding: 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .sessions-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        .session-item {
            padding: 12px;
            margin-bottom: 8px;
            background: #3a3a48;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .session-item.active {
            background: #667eea;
        }
        .session-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 14px;
        }
        .delete-session {
            background: none;
            border: none;
            color: #ff6b6b;
            cursor: pointer;
            font-size: 18px;
            padding: 0 5px;
            opacity: 0;
        }
        .session-item:hover .delete-session {
            opacity: 1;
        }
        /* 主区域 */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #f5f5f5;
        }
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .header-title h1 {
            font-size: 1.3rem;
            margin-bottom: 2px;
        }
        .header-title .subtitle {
            font-size: 0.75rem;
            opacity: 0.9;
        }
        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .deepseek-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.2);
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 0.85rem;
        }
        .toggle-switch {
            width: 40px;
            height: 20px;
            background: #ccc;
            border-radius: 20px;
            position: relative;
            cursor: pointer;
            transition: background 0.3s;
        }
        .toggle-switch.active {
            background: #4cd964;
        }
        .toggle-switch::after {
            content: '';
            width: 16px;
            height: 16px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: transform 0.3s;
        }
        .toggle-switch.active::after {
            transform: translateX(20px);
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .message {
            margin-bottom: 15px;
            display: flex;
        }
        .message.user {
            justify-content: flex-end;
        }
        .message.assistant {
            justify-content: flex-start;
        }
        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            word-wrap: break-word;
            line-height: 1.4;
        }
        .message.user .message-content {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message.assistant .message-content {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .chat-input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }
        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 25px;
            font-size: 1rem;
            outline: none;
        }
        .send-button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
        }
        /* 移动端菜单按钮 */
        .menu-toggle {
            display: none;
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 101;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 20px;
        }
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                transform: translateX(-100%);
                z-index: 200;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .menu-toggle {
                display: block;
            }
            .chat-header {
                padding-left: 60px;
            }
            .message-content {
                max-width: 85%;
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <button class="menu-toggle" id="menuToggle">☰</button>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn" id="newChatBtn">➕ 新建对话</button>
        </div>
        <div class="sessions-list" id="sessionsList"></div>
    </div>
    <div class="main-chat">
        <div class="chat-header">
            <div class="header-title">
                <h1>🤖 DeepSeek AI 助手</h1>
                <p class="subtitle">多会话 | 深度思考可切换</p>
            </div>
            <div class="controls">
                <div class="deepseek-toggle">
                    <span>🧠 深度思考</span>
                    <div class="toggle-switch" id="deepThinkToggle"></div>
                </div>
            </div>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="message assistant">
                <div class="message-content">你好！我是 DeepSeek AI 助手。你可以新建多个对话，并且打开「深度思考」开关体验更深入的推理。</div>
            </div>
        </div>
        <div class="chat-input-container">
            <input type="text" id="userInput" class="chat-input" placeholder="输入你的问题..." autocomplete="off">
            <button id="sendButton" class="send-button">发送</button>
        </div>
    </div>
    <script>
        // ========== 配置 ==========
        const DEEPSEEK_API_KEY = "sk-d654240ca2fa4568aa097746947ec6d4";  // ⚠️ 请替换成你自己的真实 API Key
        // 使用 corsproxy.io 作为代理，解决跨域和网络问题
        //const PROXY_URL = "https://proxy.cors.sh/";
        const API_URL = "https://deepseek-proxy.deno.dev/proxy/https://api.deepseek.com/chat/completions";
        
        const STORAGE_KEY_SESSIONS = "deepseek_sessions";
        const STORAGE_KEY_CURRENT = "deepseek_current_session";
        // =========================

        let sessions = {};
        let currentSessionId = null;
        let deepThinkEnabled = false;

        const sessionsListEl = document.getElementById('sessionsList');
        const chatMessagesEl = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const sendButton = document.getElementById('sendButton');
        const newChatBtn = document.getElementById('newChatBtn');
        const deepThinkToggle = document.getElementById('deepThinkToggle');
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');

        function saveSessions() {
            localStorage.setItem(STORAGE_KEY_SESSIONS, JSON.stringify(sessions));
        }
        function saveCurrentSessionId() {
            if (currentSessionId) localStorage.setItem(STORAGE_KEY_CURRENT, currentSessionId);
        }
        function generateId() {
            return Date.now() + '-' + Math.random().toString(36).substr(2, 8);
        }
        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function renderSessionsList() {
            sessionsListEl.innerHTML = '';
            const sessionIds = Object.keys(sessions);
            if (sessionIds.length === 0) {
                const newId = generateId();
                sessions[newId] = {
                    name: '新对话',
                    messages: [{ role: 'assistant', content: '你好！我是 DeepSeek AI 助手。你可以新建多个对话，并且打开「深度思考」开关体验更深入的推理。' }]
                };
                currentSessionId = newId;
                saveSessions();
                saveCurrentSessionId();
            }
            for (let id of Object.keys(sessions)) {
                const session = sessions[id];
                const div = document.createElement('div');
                div.className = `session-item ${currentSessionId === id ? 'active' : ''}`;
                div.innerHTML = `<span class="session-name">${escapeHtml(session.name)}</span><button class="delete-session" data-id="${id}">🗑️</button>`;
                div.addEventListener('click', (e) => {
                    if (e.target.classList.contains('delete-session')) return;
                    switchSession(id);
                });
                const delBtn = div.querySelector('.delete-session');
                delBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteSession(id);
                });
                sessionsListEl.appendChild(div);
            }
        }

        function switchSession(id) {
            if (!sessions[id]) return;
            currentSessionId = id;
            saveCurrentSessionId();
            renderSessionsList();
            loadMessagesToUI();
        }

        function deleteSession(id) {
            if (!sessions[id]) return;
            delete sessions[id];
            const remaining = Object.keys(sessions);
            if (remaining.length === 0) {
                const newId = generateId();
                sessions[newId] = {
                    name: '新对话',
                    messages: [{ role: 'assistant', content: '你好！我是 DeepSeek AI 助手。你可以新建多个对话，并且打开「深度思考」开关体验更深入的推理。' }]
                };
                currentSessionId = newId;
            } else {
                if (currentSessionId === id) currentSessionId = remaining[0];
            }
            saveSessions();
            saveCurrentSessionId();
            renderSessionsList();
            loadMessagesToUI();
        }

        function createNewSession() {
            const newId = generateId();
            sessions[newId] = {
                name: `对话 ${Object.keys(sessions).length + 1}`,
                messages: [{ role: 'assistant', content: '新对话已创建！有什么我可以帮你的吗？' }]
            };
            currentSessionId = newId;
            saveSessions();
            saveCurrentSessionId();
            renderSessionsList();
            loadMessagesToUI();
        }

        function loadMessagesToUI() {
            if (!currentSessionId || !sessions[currentSessionId]) return;
            const messages = sessions[currentSessionId].messages;
            chatMessagesEl.innerHTML = '';
            for (let msg of messages) {
                const div = document.createElement('div');
                div.className = `message ${msg.role === 'user' ? 'user' : 'assistant'}`;
                div.innerHTML = `<div class="message-content">${escapeHtml(msg.content)}</div>`;
                chatMessagesEl.appendChild(div);
            }
            chatMessagesEl.scrollTop = chatMessagesEl.scrollHeight;
        }

        function saveCurrentMessagesToSession() {
            if (!currentSessionId) return;
            const messageDivs = chatMessagesEl.querySelectorAll('.message');
            const messages = [];
            for (let div of messageDivs) {
                const isUser = div.classList.contains('user');
                const content = div.querySelector('.message-content').textContent;
                messages.push({ role: isUser ? 'user' : 'assistant', content: content });
            }
            sessions[currentSessionId].messages = messages;
            const firstUser = messages.find(m => m.role === 'user');
            if (firstUser) {
                let name = firstUser.content.substring(0, 20);
                if (firstUser.content.length > 20) name += '...';
                sessions[currentSessionId].name = name;
            }
            saveSessions();
            renderSessionsList();
        }

        function addMessageAndSave(content, isUser) {
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'user' : 'assistant'}`;
            div.innerHTML = `<div class="message-content">${escapeHtml(content)}</div>`;
            chatMessagesEl.appendChild(div);
            chatMessagesEl.scrollTop = chatMessagesEl.scrollHeight;
            saveCurrentMessagesToSession();
        }

        function showLoading() {
            const loading = document.createElement('div');
            loading.className = 'message assistant';
            loading.id = 'loadingMessage';
            loading.innerHTML = '<div class="message-content">思考中...</div>';
            chatMessagesEl.appendChild(loading);
            chatMessagesEl.scrollTop = chatMessagesEl.scrollHeight;
        }
        function hideLoading() {
            const el = document.getElementById('loadingMessage');
            if (el) el.remove();
        }

        async function callDeepSeekAPI(userMessage, historyMessages) {
            try {
                const apiMessages = historyMessages.map(m => ({ role: m.role, content: m.content }));
                apiMessages.push({ role: 'user', content: userMessage });
                const requestBody = {
                    model: 'deepseek-chat',
                    messages: [{ role: 'system', content: '你是一个友好、乐于助人的AI助手。' }, ...apiMessages],
                    temperature: 0.7,
                    max_tokens: 2000
                };
                if (deepThinkEnabled) {
                    requestBody.reasoning_effort = 'medium';
                }
                const response = await fetch(PROXY_URL + encodeURIComponent(API_URL), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${DEEPSEEK_API_KEY}` },
                    body: JSON.stringify(requestBody)
                });
                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error?.message || `HTTP ${response.status}`);
                }
                const data = await response.json();
                return data.choices[0].message.content;
            } catch (err) {
                console.error(err);
                throw new Error(`请求失败: ${err.message}`);
            }
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;
            userInput.disabled = true;
            sendButton.disabled = true;
            addMessageAndSave(message, true);
            const updatedMessages = sessions[currentSessionId].messages;
            const historyForAPI = updatedMessages.slice(0, -1);
            showLoading();
            try {
                const reply = await callDeepSeekAPI(message, historyForAPI);
                hideLoading();
                addMessageAndSave(reply, false);
            } catch (err) {
                hideLoading();
                addMessageAndSave(`抱歉，发生了错误：${err.message}\n\n可能原因：\n1. API密钥错误或余额不足\n2. 网络问题或代理服务暂时不可用\n3. 请稍后再试`, false);
            } finally {
                userInput.disabled = false;
                sendButton.disabled = false;
                userInput.focus();
            }
        }

        function initDeepThinkToggle() {
            const saved = localStorage.getItem('deepthink_enabled');
            if (saved === 'true') {
                deepThinkEnabled = true;
                deepThinkToggle.classList.add('active');
            }
            deepThinkToggle.addEventListener('click', () => {
                deepThinkEnabled = !deepThinkEnabled;
                if (deepThinkEnabled) deepThinkToggle.classList.add('active');
                else deepThinkToggle.classList.remove('active');
                localStorage.setItem('deepthink_enabled', deepThinkEnabled);
                const hint = document.createElement('div');
                hint.className = 'message assistant';
                hint.innerHTML = `<div class="message-content" style="font-size:0.85rem; opacity:0.7;">${deepThinkEnabled ? '✅ 已开启深度思考模式' : '⚡ 已关闭深度思考模式'}</div>`;
                chatMessagesEl.appendChild(hint);
                setTimeout(() => hint.remove(), 2000);
                chatMessagesEl.scrollTop = chatMessagesEl.scrollHeight;
            });
        }

        function loadAllData() {
            const saved = localStorage.getItem(STORAGE_KEY_SESSIONS);
            if (saved) sessions = JSON.parse(saved);
            else sessions = {};
            const savedCurrent = localStorage.getItem(STORAGE_KEY_CURRENT);
            if (savedCurrent && sessions[savedCurrent]) currentSessionId = savedCurrent;
            else {
                const ids = Object.keys(sessions);
                if (ids.length) currentSessionId = ids[0];
                else {
                    const newId = generateId();
                    sessions[newId] = {
                        name: '新对话',
                        messages: [{ role: 'assistant', content: '你好！我是 DeepSeek AI 助手。你可以新建多个对话，并且打开「深度思考」开关体验更深入的推理。' }]
                    };
                    currentSessionId = newId;
                    saveSessions();
                }
            }
            saveCurrentSessionId();
            renderSessionsList();
            loadMessagesToUI();
        }

        // 移动端菜单
        menuToggle.addEventListener('click', () => {
            sidebar.classList.toggle('open');
        });
        document.addEventListener('click', (e) => {
            if (window.innerWidth <= 768 && !sidebar.contains(e.target) && e.target !== menuToggle && sidebar.classList.contains('open')) {
                sidebar.classList.remove('open');
            }
        });

        sendButton.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter' && !userInput.disabled) sendMessage(); });
        newChatBtn.addEventListener('click', createNewSession);
        initDeepThinkToggle();
        loadAllData();
    </script>
</body>
</html>
