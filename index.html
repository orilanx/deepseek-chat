<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>DeepSeek AI 助手 - 多会话</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            background: #1e1e2f;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }
        /* 侧边栏样式 */
        .sidebar {
            width: 260px;
            background: #2d2d3a;
            color: #fff;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #3e3e4a;
        }
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #3e3e4a;
        }
        .new-chat-btn {
            width: 100%;
            padding: 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .new-chat-btn:hover {
            background: #5a67d8;
        }
        .sessions-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        .session-item {
            padding: 12px;
            margin-bottom: 8px;
            background: #3a3a48;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
        }
        .session-item.active {
            background: #667eea;
        }
        .session-item:hover {
            background: #4a4a58;
        }
        .session-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 14px;
        }
        .delete-session {
            background: none;
            border: none;
            color: #ff6b6b;
            cursor: pointer;
            font-size: 18px;
            padding: 0 5px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .session-item:hover .delete-session {
            opacity: 1;
        }
        /* 主聊天区域 */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #f5f5f5;
        }
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .header-title h1 {
            font-size: 1.3rem;
            margin-bottom: 2px;
        }
        .header-title .subtitle {
            font-size: 0.75rem;
            opacity: 0.9;
        }
        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .deepseek-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.2);
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 0.85rem;
        }
        .toggle-switch {
            width: 40px;
            height: 20px;
            background: #ccc;
            border-radius: 20px;
            position: relative;
            cursor: pointer;
            transition: background 0.3s;
        }
        .toggle-switch.active {
            background: #4cd964;
        }
        .toggle-switch::after {
            content: '';
            width: 16px;
            height: 16px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: transform 0.3s;
        }
        .toggle-switch.active::after {
            transform: translateX(20px);
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .message {
            margin-bottom: 15px;
            display: flex;
        }
        .message.user {
            justify-content: flex-end;
        }
        .message.assistant {
            justify-content: flex-start;
        }
        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            word-wrap: break-word;
            line-height: 1.4;
        }
        .message.user .message-content {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message.assistant .message-content {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .chat-input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }
        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 25px;
            font-size: 1rem;
            outline: none;
        }
        .chat-input:focus {
            border-color: #667eea;
        }
        .send-button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
        }
        .send-button:hover {
            background: #5a67d8;
        }
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -260px;
                top: 0;
                bottom: 0;
                z-index: 100;
                transition: left 0.3s;
            }
            .sidebar.open {
                left: 0;
            }
            .menu-toggle {
                display: block;
                position: fixed;
                top: 15px;
                left: 15px;
                z-index: 101;
                background: #667eea;
                color: white;
                border: none;
                border-radius: 8px;
                padding: 8px 12px;
                cursor: pointer;
            }
            .chat-header {
                padding-left: 60px;
            }
        }
        .menu-toggle {
            display: none;
        }
    </style>
</head>
<body>
    <button class="menu-toggle" id="menuToggle">☰</button>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn" id="newChatBtn">➕ 新建对话</button>
        </div>
        <div class="sessions-list" id="sessionsList"></div>
    </div>
    <div class="main-chat">
        <div class="chat-header">
            <div class="header-title">
                <h1>🤖 DeepSeek AI 助手</h1>
                <p class="subtitle">多会话 | 深度思考可切换</p>
            </div>
            <div class="controls">
                <div class="deepseek-toggle">
                    <span>🧠 深度思考</span>
                    <div class="toggle-switch" id="deepThinkToggle"></div>
                </div>
            </div>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="message assistant">
                <div class="message-content">你好！我是 DeepSeek AI 助手。你可以新建多个对话，并且打开「深度思考」开关体验更深入的推理。</div>
            </div>
        </div>
        <div class="chat-input-container">
            <input type="text" id="userInput" class="chat-input" placeholder="输入你的问题..." autocomplete="off">
            <button id="sendButton" class="send-button">发送</button>
        </div>
    </div>
    <script>
        // ========== 配置 ==========
        const DEEPSEEK_API_KEY = "sk-d654240ca2fa4568aa097746947ec6d4";
        const PROXY_URL = "https://api.allorigins.win/raw?url=";
        const API_URL = "https://api.deepseek.com/chat/completions";
        
        const STORAGE_KEY_SESSIONS = "deepseek_sessions";
        const STORAGE_KEY_CURRENT = "deepseek_current_session";
        // =========================

        // 全局状态
        let sessions = {};      // { sessionId: { name, messages } }
        let currentSessionId = null;
        let deepThinkEnabled = false;  // 深度思考开关状态

        // DOM 元素
        const sessionsListEl = document.getElementById('sessionsList');
        const chatMessagesEl = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const sendButton = document.getElementById('sendButton');
        const newChatBtn = document.getElementById('newChatBtn');
        const deepThinkToggle = document.getElementById('deepThinkToggle');
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');

        // 辅助函数：保存所有会话到 localStorage
        function saveSessions() {
            localStorage.setItem(STORAGE_KEY_SESSIONS, JSON.stringify(sessions));
        }

        // 保存当前会话ID
        function saveCurrentSessionId() {
            if (currentSessionId) {
                localStorage.setItem(STORAGE_KEY_CURRENT, currentSessionId);
            }
        }

        // 生成唯一ID
        function generateId() {
            return Date.now() + '-' + Math.random().toString(36).substr(2, 8);
        }

        // 渲染侧边栏会话列表
        function renderSessionsList() {
            sessionsListEl.innerHTML = '';
            const sessionIds = Object.keys(sessions);
            if (sessionIds.length === 0) {
                // 如果没有会话，创建一个默认会话
                const newId = generateId();
                sessions[newId] = {
                    name: '新对话',
                    messages: [
                        { role: 'assistant', content: '你好！我是 DeepSeek AI 助手。你可以新建多个对话，并且打开「深度思考」开关体验更深入的推理。' }
                    ]
                };
                currentSessionId = newId;
                saveSessions();
                saveCurrentSessionId();
            }
            
            for (let id of Object.keys(sessions)) {
                const session = sessions[id];
                const sessionDiv = document.createElement('div');
                sessionDiv.className = `session-item ${currentSessionId === id ? 'active' : ''}`;
                sessionDiv.innerHTML = `
                    <span class="session-name">${escapeHtml(session.name)}</span>
                    <button class="delete-session" data-id="${id}">🗑️</button>
                `;
                sessionDiv.addEventListener('click', (e) => {
                    if (e.target.classList.contains('delete-session')) return;
                    switchSession(id);
                });
                const deleteBtn = sessionDiv.querySelector('.delete-session');
                deleteBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteSession(id);
                });
                sessionsListEl.appendChild(sessionDiv);
            }
        }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // 切换会话
        function switchSession(sessionId) {
            if (!sessions[sessionId]) return;
            currentSessionId = sessionId;
            saveCurrentSessionId();
            renderSessionsList();
            loadMessagesToUI();
        }

        // 删除会话
        function deleteSession(sessionId) {
            if (!sessions[sessionId]) return;
            delete sessions[sessionId];
            const remainingIds = Object.keys(sessions);
            if (remainingIds.length === 0) {
                // 如果没有会话了，创建一个新的
                const newId = generateId();
                sessions[newId] = {
                    name: '新对话',
                    messages: [
                        { role: 'assistant', content: '你好！我是 DeepSeek AI 助手。你可以新建多个对话，并且打开「深度思考」开关体验更深入的推理。' }
                    ]
                };
                currentSessionId = newId;
            } else {
                if (currentSessionId === sessionId) {
                    currentSessionId = remainingIds[0];
                }
            }
            saveSessions();
            saveCurrentSessionId();
            renderSessionsList();
            loadMessagesToUI();
        }

        // 新建会话
        function createNewSession() {
            const newId = generateId();
            sessions[newId] = {
                name: `对话 ${Object.keys(sessions).length + 1}`,
                messages: [
                    { role: 'assistant', content: '新对话已创建！有什么我可以帮你的吗？' }
                ]
            };
            currentSessionId = newId;
            saveSessions();
            saveCurrentSessionId();
            renderSessionsList();
            loadMessagesToUI();
        }

        // 将当前会话的消息渲染到聊天区域
        function loadMessagesToUI() {
            if (!currentSessionId || !sessions[currentSessionId]) return;
            const messages = sessions[currentSessionId].messages;
            chatMessagesEl.innerHTML = '';
            for (let msg of messages) {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${msg.role === 'user' ? 'user' : 'assistant'}`;
                const contentDiv = document.createElement('div');
                contentDiv.className = 'message-content';
                contentDiv.textContent = msg.content;
                messageDiv.appendChild(contentDiv);
                chatMessagesEl.appendChild(messageDiv);
            }
            chatMessagesEl.scrollTop = chatMessagesEl.scrollHeight;
        }

        // 保存当前UI中的消息到当前会话
        function saveCurrentMessagesToSession() {
            if (!currentSessionId) return;
            const messageDivs = chatMessagesEl.querySelectorAll('.message');
            const messages = [];
            for (let div of messageDivs) {
                const isUser = div.classList.contains('user');
                const content = div.querySelector('.message-content').textContent;
                messages.push({ role: isUser ? 'user' : 'assistant', content: content });
            }
            sessions[currentSessionId].messages = messages;
            // 自动更新会话名称：取第一条用户消息的前20字符
            const firstUserMsg = messages.find(m => m.role === 'user');
            if (firstUserMsg) {
                let newName = firstUserMsg.content.substring(0, 20);
                if (firstUserMsg.content.length > 20) newName += '...';
                sessions[currentSessionId].name = newName;
            }
            saveSessions();
            renderSessionsList(); // 刷新侧边栏显示新名称
        }

        // 添加一条消息到UI并保存
        function addMessageAndSave(content, isUser) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'assistant'}`;
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = content;
            messageDiv.appendChild(contentDiv);
            chatMessagesEl.appendChild(messageDiv);
            chatMessagesEl.scrollTop = chatMessagesEl.scrollHeight;
            saveCurrentMessagesToSession();
        }

        function showLoading() {
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message assistant';
            loadingDiv.id = 'loadingMessage';
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = '思考中...';
            loadingDiv.appendChild(contentDiv);
            chatMessagesEl.appendChild(loadingDiv);
            chatMessagesEl.scrollTop = chatMessagesEl.scrollHeight;
        }

        function hideLoading() {
            const loadingMessage = document.getElementById('loadingMessage');
            if (loadingMessage) loadingMessage.remove();
        }

        async function callDeepSeekAPI(userMessage, historyMessages) {
            try {
                const apiMessages = [];
                for (let msg of historyMessages) {
                    apiMessages.push({ role: msg.role, content: msg.content });
                }
                apiMessages.push({ role: 'user', content: userMessage });
                
                const requestBody = {
                    model: 'deepseek-chat',
                    messages: [
                        { role: 'system', content: '你是一个友好、乐于助人的AI助手。' },
                        ...apiMessages
                    ],
                    temperature: 0.7,
                    max_tokens: 2000
                };
                
                // 如果深度思考开启，添加 reasoning_effort 参数
                if (deepThinkEnabled) {
                    requestBody.reasoning_effort = 'medium';
                }
                
                const response = await fetch(PROXY_URL + encodeURIComponent(API_URL), {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${DEEPSEEK_API_KEY}`
                    },
                    body: JSON.stringify(requestBody)
                });
                
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error?.message || `请求失败: ${response.status}`);
                }
                const data = await response.json();
                return data.choices[0].message.content;
            } catch (error) {
                console.error('API调用错误:', error);
                throw new Error(`请求失败: ${error.message}`);
            }
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;
            
            userInput.disabled = true;
            sendButton.disabled = true;
            
            addMessageAndSave(message, true);
            
            // 获取当前会话的历史消息（不包括刚添加的这条）
            const currentMessages = sessions[currentSessionId].messages;
            // 注意：currentMessages 已经包含了刚刚添加的用户消息？不，addMessageAndSave 已经保存了，所以再获取一次
            const updatedMessages = sessions[currentSessionId].messages;
            // 历史消息应该是除了最后一条用户消息之外的所有消息
            const historyForAPI = updatedMessages.slice(0, -1);
            
            showLoading();
            try {
                const response = await callDeepSeekAPI(message, historyForAPI);
                hideLoading();
                addMessageAndSave(response, false);
            } catch (error) {
                hideLoading();
                addMessageAndSave(`抱歉，发生了错误：${error.message}\n\n可能原因：\n1. API密钥错误或余额不足\n2. 网络问题或代理服务暂时不可用\n3. 请稍后再试`, false);
            } finally {
                userInput.disabled = false;
                sendButton.disabled = false;
                userInput.focus();
            }
        }

        // 深度思考开关
        function initDeepThinkToggle() {
            // 从 localStorage 读取上次的状态
            const savedDeepThink = localStorage.getItem('deepthink_enabled');
            if (savedDeepThink === 'true') {
                deepThinkEnabled = true;
                deepThinkToggle.classList.add('active');
            } else {
                deepThinkEnabled = false;
                deepThinkToggle.classList.remove('active');
            }
            deepThinkToggle.addEventListener('click', () => {
                deepThinkEnabled = !deepThinkEnabled;
                if (deepThinkEnabled) {
                    deepThinkToggle.classList.add('active');
                } else {
                    deepThinkToggle.classList.remove('active');
                }
                localStorage.setItem('deepthink_enabled', deepThinkEnabled);
                // 可选：在聊天区域显示提示
                const hintDiv = document.createElement('div');
                hintDiv.className = 'message assistant';
                hintDiv.innerHTML = `<div class="message-content" style="font-size:0.85rem; opacity:0.7;">${deepThinkEnabled ? '✅ 已开启深度思考模式，回复会更加深入。' : '⚡ 已关闭深度思考模式。'}</div>`;
                chatMessagesEl.appendChild(hintDiv);
                setTimeout(() => hintDiv.remove(), 2000);
                chatMessagesEl.scrollTop = chatMessagesEl.scrollHeight;
            });
        }

        // 加载所有数据
        function loadAllData() {
            const savedSessions = localStorage.getItem(STORAGE_KEY_SESSIONS);
            if (savedSessions) {
                sessions = JSON.parse(savedSessions);
            } else {
                sessions = {};
            }
            const savedCurrent = localStorage.getItem(STORAGE_KEY_CURRENT);
            if (savedCurrent && sessions[savedCurrent]) {
                currentSessionId = savedCurrent;
            } else {
                const ids = Object.keys(sessions);
                if (ids.length > 0) {
                    currentSessionId = ids[0];
                } else {
                    // 没有会话，创建默认
                    const newId = generateId();
                    sessions[newId] = {
                        name: '新对话',
                        messages: [
                            { role: 'assistant', content: '你好！我是 DeepSeek AI 助手。你可以新建多个对话，并且打开「深度思考」开关体验更深入的推理。' }
                        ]
                    };
                    currentSessionId = newId;
                    saveSessions();
                }
            }
            saveCurrentSessionId();
            renderSessionsList();
            loadMessagesToUI();
        }

        // 移动端菜单
        if (menuToggle) {
            menuToggle.addEventListener('click', () => {
                sidebar.classList.toggle('open');
            });
            document.addEventListener('click', (e) => {
                if (!sidebar.contains(e.target) && e.target !== menuToggle && sidebar.classList.contains('open')) {
                    sidebar.classList.remove('open');
                }
            });
        }

        // 绑定事件
        sendButton.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !userInput.disabled) sendMessage();
        });
        newChatBtn.addEventListener('click', createNewSession);
        
        initDeepThinkToggle();
        loadAllData();
    </script>
</body>
</html>
